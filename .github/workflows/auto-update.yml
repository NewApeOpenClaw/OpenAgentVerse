name: OpenAgentVerse Auto Update

on:
  schedule:
    # 每天UTC时间0点运行（北京时间8点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动更新'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y
        
    - name: 配置GitHub CLI认证
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        
    - name: 安装Python依赖
      run: |
        pip install --upgrade pip
        
    - name: 运行自动更新脚本
      run: |
        # 确保脚本目录存在
        mkdir -p scripts
        # 将Python脚本复制到scripts目录
        cp scripts/update_data.py update_data.py || true
        
        # 运行Python脚本
        python update_data.py
        
    - name: 检查生成的文件
      run: |
        echo "📊 生成的文件列表："
        echo "=================="
        if [[ -f "reports/daily/$(date +%Y-%m-%d)-report.md" ]]; then
          echo "✅ 每日报告: reports/daily/$(date +%Y-%m-%d)-report.md"
        fi
        if [[ -f "data/$(date +%Y-%m-%d)-projects.json" ]]; then
          echo "✅ 项目数据: data/$(date +%Y-%m-%d)-projects.json"
        fi
        echo "=================="
        echo "📈 数据已生成，如需提交请手动操作"
        
    - name: 发送成功通知
      if: success()
      run: |
        echo "✅ OpenAgentVerse自动更新完成!"
        echo "📅 更新时间: $(date)"
        echo "📁 报告位置: reports/daily/"
        echo "📊 数据位置: data/"
        
    - name: 发送失败通知
      if: failure()
      run: |
        echo "❌ OpenAgentVerse自动更新失败!"
        echo "📅 失败时间: $(date)"
        echo "请检查日志以获取详细信息"